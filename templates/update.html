{% extends "base.html" %}
{% block title %}
    Update Task
{% endblock title %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="text-center mb-3">Update Task</h1>
            <form action="{{ url_for('update', id=task.id) }}"
                  method="post"
                  class="input-group input-group-lg shadow-sm">
                <input type="text"
                       class="form-control"
                       name="content"
                       id="content"
                       maxlength="200"
                       value="{{ task.content }}"
                       required
                       autofocus>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i> Update
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for("index") }}"
                   class="text-secondary text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Cancel and go back
                </a>
            </div>
        </div>
    </div>
{% endblock content %}
